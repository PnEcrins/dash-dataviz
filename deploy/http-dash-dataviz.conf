<VirtualHost *:80>
    ServerName ton-domaine-ou-ip

    DocumentRoot /home/theo/workspace/dataviz_dash

    # Proxy les requêtes vers l’application Dash (supposée tourner sur le port 8050)
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8050/
    ProxyPassReverse / http://127.0.0.1:8050/

    ErrorLog ${APACHE_LOG_DIR}/dash-dataviz-error.log
    CustomLog ${APACHE_LOG_DIR}/dash-dataviz-access.log combined
</VirtualHost>