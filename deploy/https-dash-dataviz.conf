# Configuration Apache pour Dash Rapaces
# Placer dans /etc/apache2/sites-available/dash-dataviz.conf
# Puis activer : a2ensite dash-dataviz && a2enmod ssl proxy proxy_http


<VirtualHost *:443>
    ServerName DOMAIN_NAME
    ServerAlias www.DOMAIN_NAME

    # SSL - Let's Encrypt (à générer avec certbot)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/DOMAIN_NAME/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/DOMAIN_NAME/privkey.pem
    SSLCertificateChainFile /etc/letsencrypt/live/DOMAIN_NAME/chain.pem

    # Configuration SSL moderne
    SSLProtocol TLSv1.2 TLSv1.3
    SSLCipherSuite HIGH:!aNULL:!MD5
    SSLHonorCipherOrder on

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/dash-dataviz-ssl.log
    CustomLog ${APACHE_LOG_DIR}/dash-dataviz-ssl.log combined

    # Proxy vers l'appli Dash (gunicorn sur 127.0.0.1:8050)
    ProxyPreserveHost On
    ProxyRequests Off
    
    <Proxy *>
        Order allow,deny
        Allow from all
    </Proxy>

    # Route principale
    ProxyPass / http://127.0.0.1:8050/
    ProxyPassReverse / http://127.0.0.1:8050/

    # Headers
    ProxyPassReverse / http://127.0.0.1:8050/
    RequestHeader set X-Forwarded-Proto https
    RequestHeader set X-Forwarded-Host DOMAIN_NAME
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    # Configuration compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript
    </IfModule>

    # Cache control
    <FilesMatch "\.(js|css|woff|woff2|svg|png|gif|jpg|jpeg|ico)$">
        Header set Cache-Control "max-age=31536000, public"
    </FilesMatch>

    # Sécurité
    Header set X-Content-Type-Options "nosniff"
    Header set X-Frame-Options "SAMEORIGIN"
    Header set X-XSS-Protection "1; mode=block"
    Header set Referrer-Policy "strict-origin-when-cross-origin"

</VirtualHost>
